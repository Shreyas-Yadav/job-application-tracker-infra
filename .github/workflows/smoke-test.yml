name: Smoke Test on Temp EC2

on:
  workflow_call:
    inputs:
      image_tag:
        required: true
        type: string
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      AWS_SESSION_TOKEN:
        required: true
      AWS_REGION:
        required: true
      AWS_ACCOUNT_ID:
        required: true
      TEMP_EC2_AMI:
        required: true
      TEMP_EC2_SG_ID:
        required: true
      TEMP_EC2_SUBNET_ID:
        required: true

jobs:
  smoke-test:
    name: Smoke Test (Temp EC2 via SSM)
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Launch temp EC2
        id: launch
        run: |
          ID=$(aws ec2 run-instances \
            --image-id ${{ secrets.TEMP_EC2_AMI }} \
            --instance-type t3.micro \
            --iam-instance-profile Name=LabInstanceProfile \
            --security-group-ids ${{ secrets.TEMP_EC2_SG_ID }} \
            --subnet-id ${{ secrets.TEMP_EC2_SUBNET_ID }} \
            --associate-public-ip-address \
            --tag-specifications 'ResourceType=instance,Tags=[{Key=Name,Value=nightly-smoke-test}]' \
            --query 'Instances[0].InstanceId' --output text)
          echo "instance_id=$ID" >> $GITHUB_OUTPUT
          aws ec2 wait instance-running --instance-ids $ID

      - name: Wait for SSM to be ready
        run: |
          for i in $(seq 1 24); do
            STATUS=$(aws ssm describe-instance-information \
              --filters Key=InstanceIds,Values=${{ steps.launch.outputs.instance_id }} \
              --query 'InstanceInformationList[0].PingStatus' --output text 2>/dev/null)
            [ "$STATUS" = "Online" ] && echo "SSM ready" && break
            echo "Waiting for SSM ($i/24)..." && sleep 10
          done

      - name: Start services via docker compose
        run: |
          ECR="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com"
          CMD_ID=$(aws ssm send-command \
            --instance-ids ${{ steps.launch.outputs.instance_id }} \
            --document-name "AWS-RunShellScript" \
            --parameters commands="[
              \"aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${ECR}\",
              \"git clone https://github.com/Shreyas-Yadav/job-application-tracker-infra.git /tmp/infra\",
              \"AWS_ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }} IMAGE_TAG=${{ inputs.image_tag }} docker compose -f /tmp/infra/docker-compose.smoke.yml up -d\",
              \"sleep 60\"
            ]" \
            --query 'Command.CommandId' --output text)

          sleep 5
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id $CMD_ID \
              --instance-id ${{ steps.launch.outputs.instance_id }} \
              --query 'Status' --output text 2>/dev/null || echo "Pending")
            [ "$STATUS" = "Success" ] && break
            if [ "$STATUS" = "Failed" ]; then
              echo "=== STDOUT ==="
              aws ssm get-command-invocation --command-id $CMD_ID \
                --instance-id ${{ steps.launch.outputs.instance_id }} \
                --query 'StandardOutputContent' --output text
              echo "=== STDERR ==="
              aws ssm get-command-invocation --command-id $CMD_ID \
                --instance-id ${{ steps.launch.outputs.instance_id }} \
                --query 'StandardErrorContent' --output text
              exit 1
            fi
            sleep 10
          done

      - name: Run smoke tests via SSM
        run: |
          CMD_ID=$(aws ssm send-command \
            --instance-ids ${{ steps.launch.outputs.instance_id }} \
            --document-name "AWS-RunShellScript" \
            --parameters commands="[
              \"curl -sf http://localhost:5000/health || exit 1\",
              \"echo PASS: /health\",
              \"curl -sf http://localhost:5000/api/applications || exit 1\",
              \"echo PASS: /api/applications\",
              \"curl -sf http://localhost:3000 || exit 1\",
              \"echo PASS: frontend\",
              \"echo === All smoke tests passed ===\"
            ]" \
            --query 'Command.CommandId' --output text)

          sleep 5
          for i in $(seq 1 18); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id $CMD_ID \
              --instance-id ${{ steps.launch.outputs.instance_id }} \
              --query 'Status' --output text 2>/dev/null || echo "Pending")
            if [ "$STATUS" = "Success" ]; then
              aws ssm get-command-invocation \
                --command-id $CMD_ID \
                --instance-id ${{ steps.launch.outputs.instance_id }} \
                --query 'StandardOutputContent' --output text
              break
            fi
            if [ "$STATUS" = "Failed" ]; then
              echo "=== STDOUT ==="
              aws ssm get-command-invocation --command-id $CMD_ID \
                --instance-id ${{ steps.launch.outputs.instance_id }} \
                --query 'StandardOutputContent' --output text
              echo "=== STDERR ==="
              aws ssm get-command-invocation --command-id $CMD_ID \
                --instance-id ${{ steps.launch.outputs.instance_id }} \
                --query 'StandardErrorContent' --output text
              exit 1
            fi
            sleep 10
          done

      - name: Terminate temp EC2 (always)
        if: always()
        run: |
          aws ec2 terminate-instances \
            --instance-ids ${{ steps.launch.outputs.instance_id }}
