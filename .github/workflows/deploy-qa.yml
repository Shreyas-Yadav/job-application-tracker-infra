name: Deploy to QA EC2

on:
  workflow_call:
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      AWS_SESSION_TOKEN:
        required: true
      AWS_REGION:
        required: true
      AWS_ACCOUNT_ID:
        required: true
      QA_EC2_INSTANCE_ID:
        required: true
      DB_HOST:
        required: true
      DB_NAME:
        required: true
      DB_USER:
        required: true
      DB_PASSWORD:
        required: true
      NEXTAUTH_SECRET:
        required: true
      NEXTAUTH_URL:
        required: true
      GH_CLIENT_ID:
        required: true
      GH_CLIENT_SECRET:
        required: true

jobs:
  deploy-qa:
    name: Deploy to QA EC2 via SSM
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Check if QA EC2 is running
        id: check
        run: |
          STATE=$(aws ec2 describe-instances \
            --instance-ids ${{ secrets.QA_EC2_INSTANCE_ID }} \
            --query 'Reservations[0].Instances[0].State.Name' --output text)
          echo "state=$STATE" >> $GITHUB_OUTPUT
          if [ "$STATE" != "running" ]; then
            echo "QA EC2 is $STATE — skipping deploy"
          fi

      - name: Deploy via SSM
        if: steps.check.outputs.state == 'running'
        run: |
          ECR="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com"
          ENV_VARS="AWS_ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }} DB_HOST=${{ secrets.DB_HOST }} DB_NAME=${{ secrets.DB_NAME }} DB_USER=${{ secrets.DB_USER }} DB_PASSWORD=${{ secrets.DB_PASSWORD }} NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }} NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }} GITHUB_CLIENT_ID=${{ secrets.GH_CLIENT_ID }} GITHUB_CLIENT_SECRET=${{ secrets.GH_CLIENT_SECRET }}"
          CMD_ID=$(aws ssm send-command \
            --instance-ids ${{ secrets.QA_EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters commands="[
              \"aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${ECR}\",
              \"${ENV_VARS} docker compose -f /home/ubuntu/app/docker-compose.prod.yml pull\",
              \"${ENV_VARS} docker compose -f /home/ubuntu/app/docker-compose.prod.yml up -d\",
              \"sleep 10\",
              \"curl -sf http://localhost:5000/health\"
            ]" \
            --query 'Command.CommandId' --output text)

          sleep 5
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id $CMD_ID \
              --instance-id ${{ secrets.QA_EC2_INSTANCE_ID }} \
              --query 'Status' --output text 2>/dev/null || echo "Pending")
            if [ "$STATUS" = "Success" ]; then
              echo "Deploy successful"
              break
            fi
            if [ "$STATUS" = "Failed" ]; then
              echo "=== STDOUT ==="
              aws ssm get-command-invocation --command-id $CMD_ID \
                --instance-id ${{ secrets.QA_EC2_INSTANCE_ID }} \
                --query 'StandardOutputContent' --output text
              echo "=== STDERR ==="
              aws ssm get-command-invocation --command-id $CMD_ID \
                --instance-id ${{ secrets.QA_EC2_INSTANCE_ID }} \
                --query 'StandardErrorContent' --output text
              exit 1
            fi
            sleep 10
          done
